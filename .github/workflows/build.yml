name: build
# Build the plugin .pkg on GitHub by running build.sh inside a FreeBSD VM
# (GitHub has no native FreeBSD/OPNsense runner). This is a manual, artifact-only
# build for now: trigger it from the Actions tab (or `gh workflow run build.yml`),
# download the artifact, and compare/install it before wiring it into releases.
on:
  workflow_dispatch:
    inputs:
      freebsd_release:
        description: FreeBSD release for the build VM (match OPNsense base)
        default: '14.2'
        required: false

jobs:
  build:
    name: Build .pkg (FreeBSD VM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the package in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ github.event.inputs.freebsd_release }}
          usesh: true
          prepare: |
            pkg install -y git
          run: |
            set -e
            sh build.sh
            echo "=== built ==="
            ls -l dist

      - name: Upload the .pkg as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/*.pkg
          if-no-files-found: error
