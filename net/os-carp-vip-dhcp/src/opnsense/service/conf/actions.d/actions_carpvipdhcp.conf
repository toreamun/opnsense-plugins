[start]
command:/usr/local/etc/rc.d/carpvipdhcp onestart
parameters:
type:script
message:starting carpvipdhcp
template:OPNsense/CarpVipDhcp

[stop]
command:/usr/local/etc/rc.d/carpvipdhcp onestop
parameters:
type:script
message:stopping carpvipdhcp

[restart]
command:/usr/local/etc/rc.d/carpvipdhcp onerestart
parameters:
type:script
message:restarting carpvipdhcp
template:OPNsense/CarpVipDhcp

# Per-keeper variants: the rc script's 2nd arg is a single keeper id, so the
# Services overview per-row Start/Stop/Restart act on that keeper alone. Kept
# separate from the global actions above (which boot and the service
# reconfigure use with no id), so those never carry a parameter.
[start_keeper]
command:/usr/local/etc/rc.d/carpvipdhcp onestart
parameters:%s
type:script
message:starting carpvipdhcp keeper
template:OPNsense/CarpVipDhcp

[stop_keeper]
command:/usr/local/etc/rc.d/carpvipdhcp onestop
parameters:%s
type:script
message:stopping carpvipdhcp keeper

[restart_keeper]
command:/usr/local/etc/rc.d/carpvipdhcp onerestart
parameters:%s
type:script
message:restarting carpvipdhcp keeper
template:OPNsense/CarpVipDhcp

[follow_update]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/follow_update.php
parameters:%s %s
type:script
message:carpvipdhcp follow ISP address change

[sync_aliases]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/manage_alias.php
errors:no
parameters:
type:script
message:carpvipdhcp sync firewall aliases

[nudge]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/nudge_now.sh
errors:no
parameters:%s
type:script_output
message:carpvipdhcp manual ARP nudge

[status]
command:/usr/local/etc/rc.d/carpvipdhcp status
errors:no
parameters:
type:script_output
message:status carpvipdhcp

[diag]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/status.py
errors:no
parameters:
type:script_output
message:carpvipdhcp diagnostics

[log]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/logparse.py
errors:no
parameters:
type:script_output
message:carpvipdhcp log

[clear_log]
command:/usr/local/opnsense/scripts/OPNsense/CarpVipDhcp/clear_log.sh
errors:no
parameters:
type:script
message:clearing carpvipdhcp logs
